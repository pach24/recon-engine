server:
  port: 8082

spring:
  application:
    name: reconciliation-engine

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recon_db}
    username: ${SPRING_DATASOURCE_USERNAME:recon_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: reconciliation-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.recon.reconciliation.model
        spring.json.value.default.type: com.recon.reconciliation.model.RawTransactionEvent
        spring.json.use.type.headers: false

app:
  kafka:
    topic:
      raw-transactions: raw.transactions

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
